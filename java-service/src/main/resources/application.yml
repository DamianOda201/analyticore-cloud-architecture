# ==============================================================================
# CONFIGURACIÓN EXTERNA (12-Factor App & Stateless) - java-service
# ==============================================================================
server:
  port: ${PORT:8081}

spring:
  application:
    name: java-analysis-worker
  
  # Conexión externa a la base de datos PostgreSQL en Render / Local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:analyticore}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Configuración del pool de conexiones para alta concurrencia
# (Evita guardar estado en memoria y asegura reconexión a PostgreSQL)
