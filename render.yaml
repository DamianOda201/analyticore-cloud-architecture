# ==============================================================================
# RENDER BLUEPRINT SPECIFICATION (render.yaml)
# Despliegue en la nube de Render (Infrastructure as Code)
# ==============================================================================
databases:
  - name: analyticore-db
    databaseName: analyticore
    plan: free

services:
  # 1. Servicio Worker Java (Spring Boot - Clean Architecture)
  - type: web
    name: analyticore-java-worker
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: ./java-service
    plan: free
    envVars:
      - key: PORT
        value: 8081
      - key: DATABASE_URL
        fromDatabase:
          name: analyticore-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: analyticore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: analyticore-db
          property: password

  # 2. Servicio API Gateway Python (FastAPI - Clean Architecture)
  - type: web
    name: analyticore-python-gateway
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: ./python-service
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: analyticore-db
          property: connectionString
      - key: JAVA_SERVICE_URL
        value: https://analyticore-java-worker.onrender.com/api/v1/analyze

  # 3. Aplicación Web Frontend (React + CDN Estática en Render)
  - type: web
    name: analyticore-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://analyticore-python-gateway.onrender.com/api/v1/jobs
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
